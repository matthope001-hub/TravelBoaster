<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelBoast Ontario - 3D Travel Video Mapper</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0a0a0a; color: white; overflow: hidden; }
        #container { position: relative; width: 100vw; height: 100vh; }
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }

        #ui-panel {
            position: absolute; top: 20px; left: -400px;
            background: rgba(12, 12, 20, 0.96);
            backdrop-filter: blur(24px);
            padding: 20px; border-radius: 16px; min-width: 330px;
            max-height: 92vh; overflow-y: auto;
            border: 1px solid rgba(255,255,255,0.07);
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            transition: left 0.3s cubic-bezier(0.4,0,0.2,1);
            z-index: 99;
            scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent;
        }
        #ui-panel.open { left: 20px; }
        #ui-panel::-webkit-scrollbar { width: 4px; }
        #ui-panel::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

        #drawer-toggle {
            position: absolute; top: 20px; left: 20px; z-index: 100;
            width: 44px; height: 44px; border-radius: 12px;
            background: rgba(12,12,20,0.96); border: 1px solid rgba(255,255,255,0.1);
            color: white; font-size: 1.1rem; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            transition: left 0.3s cubic-bezier(0.4,0,0.2,1), background 0.2s;
        }
        #drawer-toggle.shifted { left: 370px; }
        #drawer-toggle:hover { background: rgba(30,30,50,0.98); }

        h1 {
            font-size: 1.3rem; margin-bottom: 4px; font-weight: 800; letter-spacing: -0.3px;
            background: linear-gradient(135deg, #00e676 0%, #2979ff 100%);
            -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
        }
        .subtitle { font-size: 0.75rem; color: #666; margin-bottom: 16px; }
        .section { margin-bottom: 16px; padding-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .section:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
        .section-title { font-size: 0.65rem; text-transform: uppercase; letter-spacing: 1.5px; color: #00e676; margin-bottom: 10px; font-weight: 700; }
        .control-group { margin-bottom: 10px; }
        label { display: block; margin-bottom: 4px; font-size: 0.78rem; color: #999; }

        input[type="text"], select {
            width: 100%; padding: 9px 12px;
            border: 1px solid rgba(255,255,255,0.08); border-radius: 8px;
            background: rgba(255,255,255,0.04); color: white; font-size: 0.88rem;
            -webkit-appearance: none; appearance: none; outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus, select:focus { border-color: rgba(0,230,118,0.4); }
        select option { background: #0f0f1a; color: white; }

        button {
            width: 100%; padding: 11px 16px; margin: 3px 0;
            border: none; border-radius: 10px; cursor: pointer;
            font-size: 0.88rem; font-weight: 700; transition: all 0.2s; letter-spacing: 0.2px;
        }
        .btn-primary { background: linear-gradient(135deg, #00e676 0%, #2979ff 100%); color: white; }
        .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(0,230,118,0.3); }
        .btn-success { background: linear-gradient(135deg, #00e676 0%, #69f0ae 100%); color: #002a14; }
        .btn-danger { background: linear-gradient(135deg, #ff1744 0%, #f50057 100%); color: white; }
        .btn-secondary { background: rgba(255,255,255,0.08); color: white; border: 1px solid rgba(255,255,255,0.1); }
        button:disabled { opacity: 0.4; cursor: not-allowed; }

        .preset-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .preset-btn {
            background: rgba(0,230,118,0.07); border: 1px solid rgba(0,230,118,0.18) !important;
            font-size: 0.74rem; padding: 9px 5px; margin: 0; color: #aaa; border-radius: 8px; font-weight: 600;
        }
        .preset-btn:hover { background: rgba(0,230,118,0.14) !important; color: white; }

        .route-info {
            background: rgba(41,121,255,0.07); border: 1px solid rgba(41,121,255,0.15);
            border-radius: 8px; padding: 10px; margin: 8px 0; font-size: 0.82rem;
        }
        .info-row { display: flex; justify-content: space-between; margin: 3px 0; }
        .info-value { color: #2979ff; font-weight: 700; }

        .vehicle-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 10px; }
        .vehicle-card {
            background: rgba(255,255,255,0.04); border: 2px solid transparent;
            border-radius: 10px; padding: 8px 4px; cursor: pointer;
            display: flex; flex-direction: column; align-items: center; gap: 4px;
            transition: all 0.15s; text-align: center;
        }
        .vehicle-card:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); }
        .vehicle-card.active { border-color: #00e676; background: rgba(0,230,118,0.1); }
        .vehicle-card svg { width: 38px; height: 26px; display: block; }
        .vehicle-card .vname { font-size: 0.58rem; color: #777; line-height: 1.2; }
        .vehicle-card.active .vname { color: #00e676; }

        select#camera-mode {
            background-image: url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2210%22 height=%2210%22 viewBox=%220 0 10 10%22><path fill=%22%23666%22 d=%22M5 7L1 3h8z%22/></svg>');
            background-repeat: no-repeat; background-position: right 10px center; padding-right: 28px;
        }

        .progress-bar { height: 4px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; margin: 10px 0; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #00e676, #2979ff); width: 0%; transition: width 0.1s; border-radius: 2px; }
        .controls-row { display: grid; grid-template-columns: 2fr 1fr; gap: 6px; }

        .recording-indicator {
            display: none; position: absolute; top: 20px; right: 20px;
            background: rgba(200,0,40,0.92); backdrop-filter: blur(8px);
            color: white; padding: 9px 18px; border-radius: 24px;
            font-weight: 800; font-size: 0.8rem; letter-spacing: 1px;
            animation: pulse 1.5s infinite; box-shadow: 0 4px 20px rgba(255,23,68,0.4);
        }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.7} }

        .loading { display: none; align-items: center; gap: 8px; padding: 9px; background: rgba(0,230,118,0.06); border-radius: 8px; margin: 8px 0; font-size: 0.82rem; color: #aaa; }
        .loading.active { display: flex; }
        .spinner { width: 16px; height: 16px; border: 2px solid rgba(0,230,118,0.2); border-top-color: #00e676; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .map-status { position: absolute; bottom: 16px; right: 16px; background: rgba(0,0,0,0.5); padding: 5px 12px; border-radius: 6px; font-size: 0.68rem; color: #555; pointer-events: none; }

        #countdown-overlay {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.75); z-index: 1000;
            justify-content: center; align-items: center; pointer-events: none;
        }
        #countdown-number { font-size: 9rem; font-weight: 900; color: white; text-shadow: 0 0 40px rgba(0,230,118,0.7); }

        .speed-row { display: flex; align-items: center; gap: 10px; }
        .speed-row input[type="range"] { flex: 1; }
        .speed-label { font-size: 0.78rem; color: #00e676; font-weight: 700; min-width: 32px; text-align: right; }
    </style>
</head>
<body>
<div id="container">
    <div id="canvas-container"></div>
    <div id="recording-indicator" class="recording-indicator">⏺ REC <span id="rec-timer">00:00</span></div>
    <div class="map-status" id="map-status">Loading map...</div>
    <div id="countdown-overlay"><div id="countdown-number">3</div></div>
    <button id="drawer-toggle" onclick="toggleDrawer()">☰</button>

    <div id="ui-panel">
        <h1>TravelBoast Ontario</h1>
        <div class="subtitle">3D animated road trip videos</div>

        <div class="section">
            <div class="section-title">Quick Routes</div>
            <div class="preset-grid">
                <button class="preset-btn" onclick="loadPreset('toronto-hamilton')">Toronto → Hamilton</button>
                <button class="preset-btn" onclick="loadPreset('toronto-niagara')">Toronto → Niagara</button>
                <button class="preset-btn" onclick="loadPreset('toronto-london')">Toronto → London</button>
                <button class="preset-btn" onclick="loadPreset('toronto-kingston')">Toronto → Kingston</button>
                <button class="preset-btn" onclick="loadPreset('mississauga-oakville')">Mississauga → Oakville</button>
                <button class="preset-btn" onclick="loadPreset('brampton-guelph')">Brampton → Guelph</button>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Custom Route</div>
            <div class="control-group">
                <label>From</label>
                <input type="text" id="start-input" placeholder="e.g., Toronto, ON" value="Toronto, ON">
            </div>
            <div class="control-group">
                <label>To</label>
                <input type="text" id="end-input" placeholder="e.g., Hamilton, ON" value="Hamilton, ON">
            </div>
            <div class="loading" id="loading"><div class="spinner"></div><span>Finding route...</span></div>
            <button class="btn-primary" id="route-btn" onclick="calculateRoute()">Calculate Route</button>
            <div class="route-info" id="route-info" style="display:none;">
                <div class="info-row"><span>Distance</span><span class="info-value" id="distance">-</span></div>
                <div class="info-row"><span>Est. Time</span><span class="info-value" id="duration">-</span></div>
                <div class="info-row"><span>Via</span><span class="info-value" id="highway">-</span></div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Vehicle</div>
            <div class="vehicle-grid" id="vehicle-grid"></div>
            <div class="control-group">
                <label>Camera</label>
                <select id="camera-mode">
                    <option value="chase">Chase Cam</option>
                    <option value="cinematic">Cinematic Orbit</option>
                    <option value="overhead">Overhead</option>
                    <option value="side">Side Profile</option>
                    <option value="dashboard">Dashboard</option>
                    <option value="hood">Hood Cam</option>
                </select>
            </div>
            <div class="control-group">
                <label>Speed</label>
                <div class="speed-row">
                    <input type="range" id="speed-control" min="0.1" max="3" step="0.1" value="0.6">
                    <span class="speed-label" id="speed-value">0.6×</span>
                </div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Drive</div>
            <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
            <div class="controls-row">
                <button class="btn-success" id="play-btn" onclick="toggleDrive()">▶ Start Drive</button>
                <button class="btn-secondary" onclick="resetDrive()">↺ Reset</button>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Record</div>
            <button class="btn-danger" id="record-btn" onclick="toggleRecording()">⏺ Record Video</button>
        </div>
    </div>
</div>

<script>
// ─── SVG VEHICLE ICONS ────────────────────────────────────────────────────────
const VEHICLE_SVGS = {

    tesla:`<svg viewBox="0 0 60 34" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="4" y="18" width="52" height="11" rx="4" fill="#EEEEEE"/><path d="M14 18 L20 9 L40 9 L46 18Z" fill="#E0E0E0"/><rect x="20" y="10" width="20" height="7" rx="1" fill="#0d1825" opacity="0.8"/><rect x="4" y="20" width="52" height="1.5" fill="#CCC"/><circle cx="14" cy="29" r="4.5" fill="#111"/><circle cx="14" cy="29" r="2" fill="#aaa"/><circle cx="46" cy="29" r="4.5" fill="#111"/><circle cx="46" cy="29" r="2" fill="#aaa"/><rect x="2" y="21" width="4" height="3" rx="1" fill="#fff" opacity="0.9"/><path d="M28 14 L30 10 L32 14 L31 14 L31 17 L29 17 L29 14Z" fill="#CC0000"/></svg>`,
    jeep:`<svg viewBox="0 0 58 36" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="2" y="13" width="54" height="15" rx="2" fill="#27AE36"/><rect x="5" y="5" width="44" height="10" rx="2" fill="#2ECC40"/><rect x="7" y="6" width="19" height="8" rx="1" fill="#0d1825" opacity="0.85"/><rect x="28" y="6" width="19" height="8" rx="1" fill="#0d1825" opacity="0.85"/><rect x="2" y="13" width="54" height="3" fill="#229933"/><circle cx="11" cy="30" r="5.5" fill="#111"/><circle cx="11" cy="30" r="2.5" fill="#777"/><circle cx="47" cy="30" r="5.5" fill="#111"/><circle cx="47" cy="30" r="2.5" fill="#777"/><rect x="1" y="16" width="4" height="5" rx="1" fill="#fff" opacity="0.9"/><rect x="53" y="16" width="4" height="5" rx="1" fill="#f00" opacity="0.7"/></svg>`,
    motorcycle:`<svg viewBox="0 0 50 34" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="10" cy="24" r="9" fill="#111"/><circle cx="10" cy="24" r="5" fill="#555"/><circle cx="10" cy="24" r="2" fill="#999"/><circle cx="40" cy="24" r="9" fill="#111"/><circle cx="40" cy="24" r="5" fill="#555"/><circle cx="40" cy="24" r="2" fill="#999"/><path d="M10 16 L18 11 L32 11 L40 16 L32 20 L18 20Z" fill="#D07000"/><rect x="18" y="9" width="14" height="4" rx="2" fill="#333"/><path d="M8 16 L10 16 L12 11" stroke="#777" stroke-width="1.5" fill="none"/><ellipse cx="25" cy="12" rx="8" ry="2.5" fill="#C06000" opacity="0.8"/><rect x="20" y="7" width="10" height="3" rx="1" fill="#444"/></svg>`
};

const VEHICLE_LABELS = {
    sedan:'Camry', suv:'CR-V', truck:'RAM 1500',
    sports:'BMW M4', van:'Pacifica', tesla:'Tesla 3',
    jeep:'Wrangler', motorcycle:'Harley'
};

// ─── SCENE STATE ──────────────────────────────────────────────────────────────
let scene, camera, renderer, controls;
let vehicle, vehicleBodyGroup, vehicleWheels = [];
let routeCurve, routeLine;
let mapTiles = [];
let isDriving = false, isRecording = false;
let driveProgress = 0;
let mediaRecorder, recordedChunks = [];
let dustParticles = [], time = 0;
let currentVehicleType = 'suv';

const MAP_SCALE = 15000;
let currentMapCenter = { lat: 43.65, lng: -79.38 };
let routePoints = [];

// ─── VEHICLE SPECS ────────────────────────────────────────────────────────────
// wheelR = radius. wheels sit at y=wheelR (touching ground at y=0)
const VEHICLES = {
    sedan:      { length:8,   width:3.2, height:2.2, color:0xB8B8B8, roof:0xA0A0A0, type:'sedan',  wheelR:0.7,  wheelW:0.55, wBase:2.8, wTrack:1.35 },
    suv:        { length:8.5, width:3.5, height:3.0, color:0x1B2A3A, roof:0x1B2A3A, type:'suv',    wheelR:0.85, wheelW:0.65, wBase:2.8, wTrack:1.55 },
    truck:      { length:11,  width:3.8, height:3.2, color:0xBB2200, roof:0xAA1E00, type:'truck',  wheelR:0.95, wheelW:0.72, wBase:3.2, wTrack:1.65 },
    sports:     { length:8,   width:3.4, height:1.9, color:0xCC2200, roof:0xBB1A00, type:'sports', wheelR:0.65, wheelW:0.6,  wBase:2.6, wTrack:1.5  },
    van:        { length:9.5, width:3.6, height:3.4, color:0x6C2E9C, roof:0x5A2480, type:'van',    wheelR:0.78, wheelW:0.62, wBase:2.9, wTrack:1.5  },
    tesla:      { length:8.2, width:3.2, height:2.3, color:0xEEEEEE, roof:0xDDDDDD, type:'sedan',  wheelR:0.72, wheelW:0.55, wBase:2.8, wTrack:1.4  },
    jeep:       { length:8,   width:3.6, height:3.3, color:0x2ECC40, roof:0x27AE36, type:'suv',    wheelR:0.9,  wheelW:0.72, wBase:2.5, wTrack:1.62 },
    motorcycle: { length:5,   width:1.0, height:2.4, color:0xD07000, roof:0xD07000, type:'bike',   wheelR:0.82, wheelW:0.38, wBase:3.0, wTrack:0    }
};

// ─── VEHICLE PICKER ───────────────────────────────────────────────────────────
function buildVehicleGrid() {
    const grid = document.getElementById('vehicle-grid');
    Object.entries(VEHICLE_SVGS).forEach(([key, svg]) => {
        const card = document.createElement('div');
        card.className = 'vehicle-card' + (key === 'suv' ? ' active' : '');
        card.dataset.type = key;
        card.innerHTML = svg + `<span class="vname">${VEHICLE_LABELS[key]}</span>`;
        card.onclick = () => selectVehicle(key);
        grid.appendChild(card);
    });
}

function selectVehicle(type) {
    currentVehicleType = type;
    document.querySelectorAll('.vehicle-card').forEach(c => c.classList.toggle('active', c.dataset.type === type));
    createVehicle(type);
    if (routePoints.length > 0) positionVehicleAtStart();
}

// ─── THREE.JS INIT ────────────────────────────────────────────────────────────
function init() {
    const container = document.getElementById('canvas-container');
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x080d14);
    scene.fog = new THREE.FogExp2(0x080d14, 0.00025);

    camera = new THREE.PerspectiveCamera(52, window.innerWidth / window.innerHeight, 0.5, 12000);
    camera.position.set(0, 300, 500);

    renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    container.appendChild(renderer.domElement);

    controls = new THREE.OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.maxPolarAngle = Math.PI / 2 - 0.02;
    controls.minDistance = 5;
    controls.maxDistance = 5000;

    // Lighting
    scene.add(new THREE.AmbientLight(0xffffff, 0.45));
    const hemi = new THREE.HemisphereLight(0x99aaff, 0x334422, 0.35);
    scene.add(hemi);
    const sun = new THREE.DirectionalLight(0xfff5dd, 1.0);
    sun.position.set(200, 400, 200);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.near = 1; sun.shadow.camera.far = 2000;
    sun.shadow.camera.left = sun.shadow.camera.bottom = -500;
    sun.shadow.camera.right = sun.shadow.camera.top = 500;
    scene.add(sun);

    // Ground — dark, sits at y=-0.5 so tiles render just above
    const ground = new THREE.Mesh(
        new THREE.PlaneGeometry(12000, 12000),
        new THREE.MeshBasicMaterial({ color: 0x080d08 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.6;
    ground.name = 'ground';
    scene.add(ground);

    buildVehicleGrid();
    createVehicle('suv');
    loadPreset('toronto-hamilton');
    animate();
    window.addEventListener('resize', onWindowResize);
}

// ─── MAP TILES ────────────────────────────────────────────────────────────────
function latLngToTile(lat, lng, zoom) {
    return {
        x: Math.floor((lng + 180) / 360 * Math.pow(2, zoom)),
        y: Math.floor((1 - Math.log(Math.tan(lat * Math.PI / 180) + 1 / Math.cos(lat * Math.PI / 180)) / Math.PI) / 2 * Math.pow(2, zoom))
    };
}
function tileToLatLng(x, y, zoom) {
    return {
        lat: Math.atan(Math.sinh(Math.PI * (1 - 2 * y / Math.pow(2, zoom)))) * 180 / Math.PI,
        lng: x / Math.pow(2, zoom) * 360 - 180
    };
}
function latLngToWorld(lat, lng) {
    return new THREE.Vector3(
        (lng - currentMapCenter.lng) * MAP_SCALE * Math.cos(currentMapCenter.lat * Math.PI / 180),
        0,
        -(lat - currentMapCenter.lat) * MAP_SCALE
    );
}
function clearMapTiles() { mapTiles.forEach(t => scene.remove(t)); mapTiles = []; }

function loadMapTiles(bounds, zoom) {
    clearMapTiles();
    const cLat = (bounds.minLat + bounds.maxLat) / 2;
    const cLng = (bounds.minLng + bounds.maxLng) / 2;
    currentMapCenter = { lat: cLat, lng: cLng };

    const minT = latLngToTile(bounds.maxLat, bounds.minLng, zoom);
    const maxT = latLngToTile(bounds.minLat, bounds.maxLng, zoom);
    const pad = 1;
    const x0 = Math.min(minT.x, maxT.x) - pad, x1 = Math.max(minT.x, maxT.x) + pad;
    const y0 = Math.min(minT.y, maxT.y) - pad, y1 = Math.max(minT.y, maxT.y) + pad;
    const rX = Math.min(x1 - x0 + 1, 9), rY = Math.min(y1 - y0 + 1, 9);
    const total = rX * rY;
    const mpp = 156543.03 * Math.cos(cLat * Math.PI / 180) / Math.pow(2, zoom);
    const tileSize = mpp * MAP_SCALE / 111320;
    const loader = new THREE.TextureLoader();
    loader.crossOrigin = 'anonymous';
    let done = 0;

    for (let xi = 0; xi < rX; xi++) {
        for (let yi = 0; yi < rY; yi++) {
            const tx = x0 + xi, ty = y0 + yi;
            const corner = tileToLatLng(tx, ty, zoom);
            const wp = latLngToWorld(corner.lat, corner.lng);
            const url = `https://a.basemaps.cartocdn.com/dark_all/${zoom}/${tx}/${ty}.png`;
            loader.load(url, tex => {
                done++;
                document.getElementById('map-status').textContent = `Map ${done}/${total}`;
                const mesh = new THREE.Mesh(
                    new THREE.PlaneGeometry(tileSize, tileSize),
                    new THREE.MeshBasicMaterial({ map: tex })
                );
                mesh.rotation.x = -Math.PI / 2;
                mesh.position.set(wp.x + tileSize / 2, -0.4, wp.z - tileSize / 2);
                mesh.name = 'mapTile';
                scene.add(mesh);
                mapTiles.push(mesh);
                if (done >= total) document.getElementById('map-status').textContent = 'CartoDB Dark Matter';
            }, undefined, () => { done++; });
        }
    }
}

function updateMapForRoute(start, end) {
    const pad = 0.3;
    const bounds = {
        minLat: Math.min(start.lat, end.lat) - pad, maxLat: Math.max(start.lat, end.lat) + pad,
        minLng: Math.min(start.lng, end.lng) - pad, maxLng: Math.max(start.lng, end.lng) + pad
    };
    const span = Math.max(bounds.maxLat - bounds.minLat, bounds.maxLng - bounds.minLng);
    const zoom = span > 3 ? 8 : span > 1.5 ? 9 : span > 0.6 ? 10 : 11;
    loadMapTiles(bounds, zoom);
}

// ─── VEHICLE BUILDER HELPERS ─────────────────────────────────────────────────
function box(parent, w, h, d, mat, x, y, z) {
    const m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), mat);
    m.position.set(x, y, z);
    m.castShadow = true; m.receiveShadow = true;
    parent.add(m); return m;
}
function mat(color, rough=0.3, metal=0.65) {
    return new THREE.MeshStandardMaterial({ color, roughness: rough, metalness: metal });
}
const glassMat = () => new THREE.MeshStandardMaterial({ color:0x0a1520, roughness:0.0, metalness:0.95, opacity:0.82, transparent:true });
const chromeMat = () => mat(0xcccccc, 0.05, 1.0);
const blackMat  = () => mat(0x111111, 0.85, 0.1);
const lightMat  = () => new THREE.MeshStandardMaterial({ color:0xffffff, emissive:0xffffcc, emissiveIntensity:1.2 });
const tailMat   = () => new THREE.MeshStandardMaterial({ color:0xff2200, emissive:0xff1100, emissiveIntensity:0.9 });

// ─── CREATE VEHICLE ───────────────────────────────────────────────────────────
function createVehicle(type) {
    if (vehicle) scene.remove(vehicle);
    vehicleWheels = [];

    const sp = VEHICLES[type];
    vehicle = new THREE.Group();
    vehicleBodyGroup = new THREE.Group();
    vehicle.add(vehicleBodyGroup);

    const bMat = mat(sp.color); const rMat = mat(sp.roof, 0.35, 0.55);
    const gm = glassMat(), ch = chromeMat(), bk = blackMat(), lm = lightMat(), tm = tailMat();

    if (type === 'motorcycle') buildMoto(sp, bMat, ch, bk, lm);
    else if (sp.type === 'truck') buildTruck(sp, bMat, rMat, gm, ch, bk, lm, tm);
    else if (sp.type === 'sports') buildSports(sp, bMat, gm, ch, lm, tm);
    else if (sp.type === 'van') buildVan(sp, bMat, gm, ch, lm, tm);
    else buildStandard(sp, bMat, rMat, gm, ch, bk, lm, tm);

    if (type !== 'motorcycle') addWheels(sp, bk, ch);
    addLights(sp);
    scene.add(vehicle);
}

function buildStandard(sp, bMat, rMat, gm, ch, bk, lm, tm) {
    const {length:L, width:W, height:H, wheelR:WR, type} = sp;
    const isSUV = type === 'suv', bH = H * (isSUV ? 0.52 : 0.44);
    const bY = WR + bH / 2;
    // Lower body
    box(vehicleBodyGroup, W, bH, L, bMat, 0, bY, 0);
    // Cabin
    const cH = H * (isSUV ? 0.52 : 0.60), cL = L * (isSUV ? 0.72 : 0.64);
    const cY = WR + bH + cH / 2;
    box(vehicleBodyGroup, W * 0.92, cH, cL, rMat, 0, cY, -L * 0.04);
    // Glass — windshield
    box(vehicleBodyGroup, W * 0.88, cH * 0.58, 0.18, gm, 0, cY + cH * 0.02, L * 0.305);
    box(vehicleBodyGroup, W * 0.88, cH * 0.5, 0.15, gm, 0, cY - cH * 0.04, -cL * 0.46);
    // Side glass
    box(vehicleBodyGroup, 0.12, cH * 0.48, cL * 0.82, gm, W * 0.42, cY + cH * 0.04, -L * 0.04);
    box(vehicleBodyGroup, 0.12, cH * 0.48, cL * 0.82, gm, -W * 0.42, cY + cH * 0.04, -L * 0.04);
    // Grille
    box(vehicleBodyGroup, W * 0.52, bH * 0.38, 0.12, bk, 0, bY + bH * 0.15, L * 0.49);
    // Bumpers
    box(vehicleBodyGroup, W * 0.98, H * 0.1, 0.22, ch, 0, WR + H * 0.06, L * 0.49);
    box(vehicleBodyGroup, W * 0.98, H * 0.1, 0.22, ch, 0, WR + H * 0.06, -L * 0.49);
    // Headlights
    box(vehicleBodyGroup, W * 0.2, bH * 0.28, 0.12, lm, W * 0.33, bY + bH * 0.22, L * 0.49);
    box(vehicleBodyGroup, W * 0.2, bH * 0.28, 0.12, lm, -W * 0.33, bY + bH * 0.22, L * 0.49);
    // Taillights
    box(vehicleBodyGroup, W * 0.18, bH * 0.24, 0.1, tm, W * 0.34, bY + bH * 0.18, -L * 0.49);
    box(vehicleBodyGroup, W * 0.18, bH * 0.24, 0.1, tm, -W * 0.34, bY + bH * 0.18, -L * 0.49);
    // Mirrors
    box(vehicleBodyGroup, 0.34, 0.2, 0.26, bk, W * 0.49, cY + 0.08, L * 0.17);
    box(vehicleBodyGroup, 0.34, 0.2, 0.26, bk, -W * 0.49, cY + 0.08, L * 0.17);
    if (isSUV) {
        box(vehicleBodyGroup, W * 0.7, 0.1, cL * 0.88, ch, 0, cY + cH / 2 + 0.06, -L * 0.04);
    }
}

function buildTruck(sp, bMat, rMat, gm, ch, bk, lm, tm) {
    const {length:L, width:W, height:H, wheelR:WR} = sp;
    const bH = H * 0.36, bY = WR + bH / 2;
    // Bed
    box(vehicleBodyGroup, W * 0.96, bH, L * 0.52, bMat, 0, bY, L * 0.22);
    box(vehicleBodyGroup, W * 0.96, bH * 0.6, 0.14, bMat, 0, bY + bH * 0.42, L * 0.48);
    box(vehicleBodyGroup, 0.14, bH * 0.6, L * 0.5, bMat, W * 0.47, bY + bH * 0.42, L * 0.22);
    box(vehicleBodyGroup, 0.14, bH * 0.6, L * 0.5, bMat, -W * 0.47, bY + bH * 0.42, L * 0.22);
    // Cab
    const cH = H * 0.72, cY = WR + cH / 2;
    box(vehicleBodyGroup, W * 0.98, cH, L * 0.44, bMat, 0, cY, -L * 0.27);
    const roofH = H * 0.2;
    box(vehicleBodyGroup, W * 0.9, roofH, L * 0.38, rMat, 0, cY + cH / 2 + roofH / 2, -L * 0.27);
    // Glass
    box(vehicleBodyGroup, W * 0.88, cH * 0.38, 0.15, gm, 0, cY + cH * 0.16, -L * 0.067);
    box(vehicleBodyGroup, W * 0.88, cH * 0.32, 0.14, gm, 0, cY + cH * 0.1, -L * 0.47);
    box(vehicleBodyGroup, 0.12, cH * 0.34, L * 0.38, gm, W * 0.45, cY + cH * 0.16, -L * 0.27);
    box(vehicleBodyGroup, 0.12, cH * 0.34, L * 0.38, gm, -W * 0.45, cY + cH * 0.16, -L * 0.27);
    // RAM grille
    box(vehicleBodyGroup, W * 0.7, H * 0.33, 0.2, bk, 0, cY - cH * 0.12, -L * 0.49);
    box(vehicleBodyGroup, W * 0.78, H * 0.08, 0.22, ch, 0, cY - cH * 0.36, -L * 0.49);
    // Headlights
    box(vehicleBodyGroup, W * 0.18, H * 0.12, 0.14, lm, W * 0.37, cY - cH * 0.1, -L * 0.49);
    box(vehicleBodyGroup, W * 0.18, H * 0.12, 0.14, lm, -W * 0.37, cY - cH * 0.1, -L * 0.49);
    box(vehicleBodyGroup, W * 0.16, H * 0.1, 0.1, tm, W * 0.4, bY + bH * 0.28, L * 0.49);
    box(vehicleBodyGroup, W * 0.16, H * 0.1, 0.1, tm, -W * 0.4, bY + bH * 0.28, L * 0.49);
    // Bumpers
    box(vehicleBodyGroup, W, H * 0.13, 0.28, ch, 0, WR + H * 0.08, -L * 0.49);
    box(vehicleBodyGroup, W * 0.96, H * 0.1, 0.22, ch, 0, WR + H * 0.06, L * 0.49);
    // Mirrors
    box(vehicleBodyGroup, 0.42, 0.3, 0.28, bk, W * 0.52, cY + cH * 0.18, -L * 0.32);
    box(vehicleBodyGroup, 0.42, 0.3, 0.28, bk, -W * 0.52, cY + cH * 0.18, -L * 0.32);
}

function buildSports(sp, bMat, gm, ch, lm, tm) {
    const {length:L, width:W, height:H, wheelR:WR} = sp;
    const bH = H * 0.44, bY = WR + bH / 2;
    box(vehicleBodyGroup, W, bH, L, bMat, 0, bY, 0);
    // Low cockpit
    const ckH = H * 0.3, ckY = WR + bH + ckH / 2;
    box(vehicleBodyGroup, W * 0.7, ckH, L * 0.36, bMat, 0, ckY, -L * 0.09);
    box(vehicleBodyGroup, W * 0.68, ckH * 0.65, 0.14, gm, 0, ckY + ckH * 0.05, L * 0.16);
    box(vehicleBodyGroup, W * 0.68, ckH * 0.55, 0.13, gm, 0, ckY - ckH * 0.08, -L * 0.25);
    // Spoiler
    box(vehicleBodyGroup, W * 0.82, 0.14, 0.5, bMat, 0, WR + bH + ckH * 0.88, -L * 0.44);
    box(vehicleBodyGroup, 0.12, ckH * 0.7, 0.12, bMat, W * 0.33, ckY, -L * 0.44);
    box(vehicleBodyGroup, 0.12, ckH * 0.7, 0.12, bMat, -W * 0.33, ckY, -L * 0.44);
    // Lights
    box(vehicleBodyGroup, W * 0.22, bH * 0.2, 0.1, lm, W * 0.34, bY + bH * 0.3, L * 0.49);
    box(vehicleBodyGroup, W * 0.22, bH * 0.2, 0.1, lm, -W * 0.34, bY + bH * 0.3, L * 0.49);
    box(vehicleBodyGroup, W * 0.2, bH * 0.18, 0.1, tm, W * 0.35, bY + bH * 0.26, -L * 0.49);
    box(vehicleBodyGroup, W * 0.2, bH * 0.18, 0.1, tm, -W * 0.35, bY + bH * 0.26, -L * 0.49);
    box(vehicleBodyGroup, W * 0.88, 0.12, 0.3, ch, 0, WR + 0.07, L * 0.49);
    box(vehicleBodyGroup, W * 0.28, 0.18, 0.22, bMat, W * 0.42, ckY + 0.06, L * 0.1);
    box(vehicleBodyGroup, W * 0.28, 0.18, 0.22, bMat, -W * 0.42, ckY + 0.06, L * 0.1);
}

function buildVan(sp, bMat, gm, ch, lm, tm) {
    const {length:L, width:W, height:H, wheelR:WR} = sp;
    const bH = H * 0.88, bY = WR + bH / 2;
    box(vehicleBodyGroup, W, bH, L, bMat, 0, bY, 0);
    box(vehicleBodyGroup, W * 0.9, bH * 0.3, 0.16, gm, 0, bY + bH * 0.18, L * 0.49);
    box(vehicleBodyGroup, W * 0.88, bH * 0.26, 0.14, gm, 0, bY + bH * 0.14, -L * 0.49);
    box(vehicleBodyGroup, 0.12, bH * 0.28, L * 0.52, gm, W * 0.49, bY + bH * 0.2, -L * 0.04);
    box(vehicleBodyGroup, 0.12, bH * 0.28, L * 0.28, gm, -W * 0.49, bY + bH * 0.2, -L * 0.06);
    box(vehicleBodyGroup, 0.12, bH * 0.22, L * 0.13, gm, W * 0.49, bY + bH * 0.22, L * 0.31);
    box(vehicleBodyGroup, 0.12, bH * 0.22, L * 0.13, gm, -W * 0.49, bY + bH * 0.22, L * 0.31);
    box(vehicleBodyGroup, W * 0.18, H * 0.1, 0.12, lm, W * 0.36, bY + bH * 0.25, L * 0.49);
    box(vehicleBodyGroup, W * 0.18, H * 0.1, 0.12, lm, -W * 0.36, bY + bH * 0.25, L * 0.49);
    box(vehicleBodyGroup, W * 0.16, H * 0.1, 0.1, tm, W * 0.38, bY + bH * 0.22, -L * 0.49);
    box(vehicleBodyGroup, W * 0.16, H * 0.1, 0.1, tm, -W * 0.38, bY + bH * 0.22, -L * 0.49);
    box(vehicleBodyGroup, W, H * 0.1, 0.22, ch, 0, WR + H * 0.07, L * 0.49);
    box(vehicleBodyGroup, W, H * 0.1, 0.22, ch, 0, WR + H * 0.07, -L * 0.49);
    box(vehicleBodyGroup, 0.48, 0.32, 0.26, blackMat(), W * 0.54, bY + bH * 0.25, L * 0.32);
    box(vehicleBodyGroup, 0.48, 0.32, 0.26, blackMat(), -W * 0.54, bY + bH * 0.25, L * 0.32);
    function blackMat() { return mat(0x111111, 0.85, 0.1); }
}

function buildMoto(sp, bMat, ch, bk, lm) {
    const {length:L, width:W, height:H, wheelR:WR} = sp;
    const gY = WR;
    const chromeSt = mat(0x888888, 0.1, 0.9);
    box(vehicleBodyGroup, W * 0.32, H * 0.07, L * 0.48, chromeSt, 0, gY + H * 0.34, 0);
    box(vehicleBodyGroup, W * 0.9, H * 0.28, L * 0.26, bMat, 0, gY + H * 0.44, L * 0.09);
    box(vehicleBodyGroup, W * 0.82, H * 0.22, L * 0.2, bMat, 0, gY + H * 0.54, L * 0.1);
    box(vehicleBodyGroup, W * 0.72, H * 0.1, L * 0.33, bk, 0, gY + H * 0.42, -L * 0.18);
    box(vehicleBodyGroup, W * 0.18, H * 0.54, W * 0.18, ch, 0, gY + H * 0.38, L * 0.38);
    box(vehicleBodyGroup, W * 1.8, H * 0.06, W * 0.12, ch, 0, gY + H * 0.79, L * 0.3);
    box(vehicleBodyGroup, W * 0.12, H * 0.2, W * 0.12, ch, W * 0.88, gY + H * 0.71, L * 0.3);
    box(vehicleBodyGroup, W * 0.12, H * 0.2, W * 0.12, ch, -W * 0.88, gY + H * 0.71, L * 0.3);
    box(vehicleBodyGroup, W * 0.55, W * 0.45, W * 0.28, lm, 0, gY + H * 0.72, L * 0.43);
    box(vehicleBodyGroup, W * 0.1, H * 0.07, L * 0.28, chromeSt, W * 0.44, gY + H * 0.26, -L * 0.1);
    const wMat = mat(0x111111, 0.9, 0.0), rMat = mat(0xcccccc, 0.05, 1.0);
    [L * 0.4, -L * 0.4].forEach(z => {
        const wg = new THREE.Group();
        const tire = new THREE.Mesh(new THREE.CylinderGeometry(WR, WR, W * 0.38, 28), wMat);
        tire.rotation.z = Math.PI / 2; wg.add(tire);
        const rim = new THREE.Mesh(new THREE.CylinderGeometry(WR * 0.62, WR * 0.62, W * 0.4, 20), rMat);
        rim.rotation.z = Math.PI / 2; wg.add(rim);
        wg.position.set(0, WR, z);
        vehicle.add(wg); vehicleWheels.push(wg);
    });
}

function addWheels(sp, tireMat, rimMat) {
    const {width:W, wheelR:WR, wheelW:WW, wBase, wTrack} = sp;
    const spokeMat = mat(0xaaaaaa, 0.2, 0.8);
    [[wTrack, WR, wBase/2], [-wTrack, WR, wBase/2], [wTrack, WR, -wBase/2], [-wTrack, WR, -wBase/2]].forEach(([x,y,z]) => {
        const wg = new THREE.Group();
        const tire = new THREE.Mesh(new THREE.CylinderGeometry(WR, WR, WW, 28), tireMat);
        tire.rotation.z = Math.PI / 2; tire.castShadow = true; wg.add(tire);
        // Sidewall torus
        const tw = new THREE.TorusGeometry(WR * 0.88, WW * 0.09, 6, 28);
        [-WW/2.1, WW/2.1].forEach(xo => {
            const sw = new THREE.Mesh(tw, tireMat);
            sw.position.x = xo; sw.rotation.y = Math.PI / 2; wg.add(sw);
        });
        const rim = new THREE.Mesh(new THREE.CylinderGeometry(WR * 0.68, WR * 0.68, WW * 0.9, 24), rimMat);
        rim.rotation.z = Math.PI / 2; wg.add(rim);
        for (let i = 0; i < 5; i++) {
            const a = (i / 5) * Math.PI * 2;
            const sp2 = new THREE.Mesh(new THREE.BoxGeometry(WR * 1.18, WW * 0.42, 0.1), spokeMat);
            sp2.rotation.x = a; sp2.rotation.y = Math.PI / 2; wg.add(sp2);
        }
        const cap = new THREE.Mesh(new THREE.CylinderGeometry(WR * 0.17, WR * 0.17, WW * 0.92, 14), rimMat);
        cap.rotation.z = Math.PI / 2; wg.add(cap);
        wg.position.set(x, y, z);
        vehicle.add(wg); vehicleWheels.push(wg);
    });
}

function addLights(sp) {
    const {length:L, width:W, height:H, wheelR:WR, type} = sp;
    const bH = H * (type === 'truck' ? 0.36 : 0.44);
    const ly = WR + bH * 0.55;
    [[W*0.25, L*0.5], [-W*0.25, L*0.5]].forEach(([lx, lz]) => {
        const sl = new THREE.SpotLight(0xfff5cc, 1.8, 100, Math.PI/7, 0.5, 1.5);
        sl.position.set(lx, ly, lz);
        sl.target.position.set(lx, 0, lz + 60);
        vehicle.add(sl); vehicle.add(sl.target);
    });
    const ptl = new THREE.PointLight(0xff1100, 0.6, 12);
    ptl.position.set(0, ly, -L * 0.5);
    vehicle.add(ptl);
}

function parseLocation(input) {
    const m = input.match(/^(-?\d+\.?\d*)\s*,\s*(-?\d+\.?\d*)$/);
    if (m) return { lat: parseFloat(m[1]), lng: parseFloat(m[2]) };
    const key = input.toLowerCase().replace(/\s+/g,'-').replace(/,.*$/,'');
    return CITIES[key] || null;
}

async function geocode(addr) {
    const q = addr.toLowerCase().includes('ontario') ? addr : addr + ', Ontario, Canada';
    try {
        const d = await (await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=1`)).json();
        if (d && d.length) return { lat: parseFloat(d[0].lat), lng: parseFloat(d[0].lon) };
    } catch(e) {}
    return null;
}

async function calculateRoute() {
    const sv = document.getElementById('start-input').value;
    const ev = document.getElementById('end-input').value;
    document.getElementById('loading').classList.add('active');
    document.getElementById('route-btn').disabled = true;
    try {
        const s = parseLocation(sv) || await geocode(sv);
        const e = parseLocation(ev) || await geocode(ev);
        if (!s || !e) throw new Error();
        const d = await (await fetch(`https://router.project-osrm.org/route/v1/driving/${s.lng},${s.lat};${e.lng},${e.lat}?overview=full&geometries=geojson`)).json();
        if (d.code === 'Ok') applyRoute(d.routes[0], s, e);
        else createDirectRoute(s, e);
    } catch(err) {
        createDirectRoute(parseLocation(sv)||CITIES.toronto, parseLocation(ev)||CITIES.hamilton);
    } finally {
        document.getElementById('loading').classList.remove('active');
        document.getElementById('route-btn').disabled = false;
    }
}

function applyRoute(rd, start, end) {
    updateMapForRoute(start, end);
    setTimeout(() => {
        routePoints = rd.geometry.coordinates.map(c => { const p = latLngToWorld(c[1],c[0]); p.y=0; return p; });
        finishRoute(rd.distance, rd.duration, start, end);
    }, 60);
}

function createDirectRoute(start, end) {
    updateMapForRoute(start, end);
    setTimeout(() => {
        const s = latLngToWorld(start.lat, start.lng); s.y=0;
        const e = latLngToWorld(end.lat, end.lng); e.y=0;
        const mid = new THREE.Vector3((s.x+e.x)/2+(Math.random()-.5)*18, 0, (s.z+e.z)/2);
        routePoints = [];
        for (let i = 0; i <= 60; i++) {
            const t = i/60;
            routePoints.push(new THREE.Vector3(
                (1-t)*(1-t)*s.x + 2*(1-t)*t*mid.x + t*t*e.x, 0,
                (1-t)*(1-t)*s.z + 2*(1-t)*t*mid.z + t*t*e.z
            ));
        }
        finishRoute(s.distanceTo(e)/MAP_SCALE*111320*1000, s.distanceTo(e)/MAP_SCALE*111320/80*3600, start, end);
    }, 60);
}

function finishRoute(distM, durS, start, end) {
    routeCurve = new THREE.CatmullRomCurve3(routePoints, false, 'catmullrom', 0.4);
    createRouteLine();
    document.getElementById('distance').textContent = (distM/1000).toFixed(1) + ' km';
    document.getElementById('duration').textContent = Math.round(durS/60) + ' min';
    document.getElementById('highway').textContent = guessHighway(start, end);
    document.getElementById('route-info').style.display = 'block';
    resetCameraToRoute();
    resetDrive();
}

function guessHighway(s, e) {
    const n = (s.name||'') + (e.name||'');
    if (n.includes('Hamilton')) return 'QEW / Gardiner';
    if (n.includes('Niagara')) return 'QEW';
    if (n.includes('London')) return 'Hwy 401 / 403';
    if (n.includes('Kingston')) return 'Hwy 401 East';
    return 'Provincial Highway';
}

function createRouteLine() {
    if (routeLine) scene.remove(routeLine);
    if (routePoints.length < 2) return;
    const geo = new THREE.TubeGeometry(routeCurve, Math.min(routePoints.length*2,500), 0.55, 8, false);
    const matR = new THREE.MeshStandardMaterial({ color:0x0099ff, emissive:0x0055cc, emissiveIntensity:0.7, roughness:0.4 });
    routeLine = new THREE.Mesh(geo, matR);
    routeLine.position.y = 0.35;
    scene.add(routeLine);
    createMarker(routePoints[0], 0x00e676, 'START');
    createMarker(routePoints[routePoints.length-1], 0xff1744, 'END');
}

function createMarker(pos, color, label) {
    const g = new THREE.Group();
    g.add(Object.assign(new THREE.Mesh(new THREE.CylinderGeometry(0.28,0.28,8,8), new THREE.MeshStandardMaterial({color})), { position: new THREE.Vector3(0,4,0) }));
    const sph = new THREE.Mesh(new THREE.SphereGeometry(2,14,14), new THREE.MeshStandardMaterial({color, emissive:color, emissiveIntensity:0.5}));
    sph.position.y = 9; g.add(sph);
    g.position.set(pos.x, 0, pos.z); scene.add(g);
    const cv = document.createElement('canvas'); cv.width=128; cv.height=44;
    const ctx = cv.getContext('2d');
    ctx.fillStyle = color === 0x00e676 ? 'rgba(0,200,100,0.88)' : 'rgba(220,20,50,0.88)';
    ctx.roundRect(2,2,124,40,8); ctx.fill();
    ctx.fillStyle='#fff'; ctx.font='bold 20px system-ui'; ctx.textAlign='center';
    ctx.fillText(label, 64, 28);
    const sprite = new THREE.Sprite(new THREE.SpriteMaterial({map:new THREE.CanvasTexture(cv)}));
    sprite.position.set(pos.x, 15, pos.z); sprite.scale.set(14,4.8,1); scene.add(sprite);
}

function positionVehicleAtStart() {
    if (!vehicle || routePoints.length < 2) return;
    vehicle.position.copy(routePoints[0]); vehicle.position.y = 0;
    vehicle.lookAt(new THREE.Vector3(routePoints[1].x, 0, routePoints[1].z));
}

function resetCameraToRoute() {
    if (!routePoints.length) return;
    const c = new THREE.Vector3(); routePoints.forEach(p => c.add(p)); c.divideScalar(routePoints.length);
    const span = routePoints[0].distanceTo(routePoints[routePoints.length-1]);
    camera.position.set(c.x - span*0.28, Math.max(60, span*0.26), c.z + span*0.38);
    controls.target.copy(c); controls.update();
}

// ─── ANIMATION ────────────────────────────────────────────────────────────────
function animate() {
    requestAnimationFrame(animate);
    time += 0.016;

    if (isDriving && routeCurve) {
        const speed = parseFloat(document.getElementById('speed-control').value);
        driveProgress += 0.0017 * speed;
        if (driveProgress >= 1) {
            driveProgress = 1; isDriving = false;
            document.getElementById('play-btn').textContent = '▶ Start Drive';
        }

        const pt = routeCurve.getPoint(driveProgress);
        const tg = routeCurve.getTangent(driveProgress);

        // Vehicle sits on ground — y always 0
        vehicle.position.set(pt.x, 0, pt.z);
        vehicle.lookAt(new THREE.Vector3(pt.x + tg.x, 0, pt.z + tg.z));

        // Banking on turns
        const nt = routeCurve.getTangent(Math.min(driveProgress + 0.008, 1));
        const turn = tg.angleTo(nt) * (nt.x > tg.x ? 1 : -1);
        vehicle.rotation.z = -turn * 2.2;

        // Suspension — body group only, wheels stay on ground
        if (vehicleBodyGroup) {
            const bf = time * 11 * speed, amp = 0.055 * speed;
            vehicleBodyGroup.position.y = Math.sin(bf)*amp + Math.sin(bf*2.2)*amp*0.28;
            vehicleBodyGroup.rotation.x = Math.sin(bf*0.6)*0.012*speed;
            vehicleBodyGroup.rotation.z = turn * 0.35;
        }

        // Wheel spin
        vehicleWheels.forEach(w => { w.rotation.x += speed * 0.1; });

        // Dust
        if (Math.random() < 0.2 * speed) spawnDust(vehicle.position.clone(), tg);

        document.getElementById('progress-fill').style.width = (driveProgress*100) + '%';
        updateCamera();

    } else if (vehicleBodyGroup) {
        vehicleBodyGroup.position.y = THREE.MathUtils.lerp(vehicleBodyGroup.position.y, 0, 0.12);
        vehicleBodyGroup.rotation.x = THREE.MathUtils.lerp(vehicleBodyGroup.rotation.x, 0, 0.12);
        vehicleBodyGroup.rotation.z = THREE.MathUtils.lerp(vehicleBodyGroup.rotation.z, 0, 0.12);
    }

    updateDust();
    controls.update();
    renderer.render(scene, camera);
}

function updateCamera() {
    const mode = document.getElementById('camera-mode').value;
    const speed = parseFloat(document.getElementById('speed-control').value);
    const vp = vehicle.position.clone();
    const vd = new THREE.Vector3(); vehicle.getWorldDirection(vd);
    let target, look = vp.clone(), sm = 0.06;

    switch(mode) {
        case 'chase':
            target = vp.clone().sub(vd.clone().multiplyScalar(32+speed*4)).add(new THREE.Vector3(0,20+speed*2,0));
            look = vp.clone().add(vd.clone().multiplyScalar(45)); break;
        case 'cinematic':
            const a = time * 0.24, r = 42+speed*5;
            target = vp.clone().add(new THREE.Vector3(Math.sin(a)*r, 26, Math.cos(a)*r)); break;
        case 'overhead':
            target = vp.clone().add(new THREE.Vector3(0,85+speed*8,0)); sm=0.04; break;
        case 'side':
            const perp = new THREE.Vector3(-vd.z,0,vd.x).normalize().multiplyScalar(30+speed*4);
            target = vp.clone().add(perp).add(new THREE.Vector3(0,16,0));
            look = vp.clone().add(vd.clone().multiplyScalar(28)); break;
        case 'dashboard':
            target = vp.clone().add(vd.clone().multiplyScalar(1.2)).add(new THREE.Vector3(0,2.8,0));
            look = vp.clone().add(vd.clone().multiplyScalar(200)); sm=0.16; break;
        case 'hood':
            target = vp.clone().add(vd.clone().multiplyScalar(3.5)).add(new THREE.Vector3(0,1.8,0));
            look = vp.clone().add(vd.clone().multiplyScalar(120)); sm=0.14; break;
    }
    if (target) {
        camera.position.lerp(target, sm);
        controls.target.lerp(look, sm*1.6);
    }
}

// ─── DUST ────────────────────────────────────────────────────────────────────
function spawnDust(pos, tangent) {
    const sp = VEHICLES[currentVehicleType];
    const offsets = sp.type === 'bike' ? [0] : [-(sp.wTrack||1.4), sp.wTrack||1.4];
    offsets.forEach(xo => {
        const p = new THREE.Mesh(
            new THREE.SphereGeometry(0.22, 4, 4),
            new THREE.MeshBasicMaterial({ color:0x5a5040, transparent:true, opacity:0.45 })
        );
        p.position.copy(pos);
        p.position.x += xo;
        p.position.add(tangent.clone().multiplyScalar(-2));
        p.position.y = 0.2;
        p.userData = { vx:(Math.random()-.5)*0.25, vy:0.04+Math.random()*0.05, vz:(Math.random()-.5)*0.25, life:1.0, decay:0.028+Math.random()*0.018 };
        scene.add(p); dustParticles.push(p);
    });
}
function updateDust() {
    for (let i = dustParticles.length-1; i >= 0; i--) {
        const p = dustParticles[i];
        p.position.x += p.userData.vx; p.position.y += p.userData.vy; p.position.z += p.userData.vz;
        p.userData.vy *= 0.94;
        p.userData.life -= p.userData.decay;
        p.material.opacity = p.userData.life * 0.44;
        p.scale.setScalar(1 + (1 - p.userData.life) * 1.8);
        if (p.userData.life <= 0) { scene.remove(p); dustParticles.splice(i,1); }
    }
}

// ─── UI / CONTROLS ────────────────────────────────────────────────────────────
let isDrawerOpen = false;
function toggleDrawer() {
    isDrawerOpen = !isDrawerOpen;
    document.getElementById('ui-panel').classList.toggle('open', isDrawerOpen);
    document.getElementById('drawer-toggle').classList.toggle('shifted', isDrawerOpen);
    document.getElementById('drawer-toggle').innerHTML = isDrawerOpen ? '✕' : '☰';
}
setTimeout(() => { if (!isDrawerOpen) toggleDrawer(); }, 400);

function toggleDrive() {
    if (driveProgress >= 1) driveProgress = 0;
    if (!isDriving) {
        if (isDrawerOpen) toggleDrawer();
        isDriving = true; document.getElementById('play-btn').textContent = '⏸ Pause';
    } else {
        isDriving = false; document.getElementById('play-btn').textContent = '▶ Start Drive';
    }
}

function resetDrive() {
    isDriving = false; driveProgress = 0;
    document.getElementById('play-btn').textContent = '▶ Start Drive';
    document.getElementById('progress-fill').style.width = '0%';
    if (!isDrawerOpen) toggleDrawer();
    positionVehicleAtStart();
}

document.addEventListener('keydown', e => { if (e.key === 'Escape' && !isDrawerOpen) toggleDrawer(); });

function loadPreset(key) {
    const map = {
        'toronto-hamilton':{start:CITIES.toronto,end:CITIES.hamilton},
        'toronto-niagara':{start:CITIES.toronto,end:CITIES.niagara},
        'toronto-london':{start:CITIES.toronto,end:CITIES.london},
        'toronto-kingston':{start:CITIES.toronto,end:CITIES.kingston},
        'mississauga-oakville':{start:CITIES.mississauga,end:CITIES.oakville},
        'brampton-guelph':{start:CITIES.brampton,end:CITIES.guelph}
    };
    const r = map[key]; if (!r) return;
    document.getElementById('start-input').value = r.start.name;
    document.getElementById('end-input').value = r.end.name;
    calculateRoute();
}

// ─── RECORDING ────────────────────────────────────────────────────────────────
async function toggleRecording() { isRecording ? stopRecording() : startRecording(); }

async function startRecording() {
    document.getElementById('ui-panel').style.opacity = '0';
    document.getElementById('ui-panel').style.pointerEvents = 'none';
    const overlay = document.getElementById('countdown-overlay');
    const num = document.getElementById('countdown-number');
    overlay.style.display = 'flex';
    for (let i=3; i>0; i--) { num.textContent=i; await sleep(1000); }
    num.textContent='GO!'; await sleep(500);
    overlay.style.display='none';
    document.getElementById('ui-panel').style.opacity='1';
    document.getElementById('ui-panel').style.pointerEvents='';

    const mime = MediaRecorder.isTypeSupported('video/webm;codecs=vp9') ? 'video/webm;codecs=vp9' : 'video/webm';
    recordedChunks = [];
    mediaRecorder = new MediaRecorder(renderer.domElement.captureStream(60), { mimeType:mime, videoBitsPerSecond:6000000 });
    mediaRecorder.ondataavailable = e => { if (e.data.size>0) recordedChunks.push(e.data); };
    mediaRecorder.onstop = () => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(new Blob(recordedChunks,{type:mime}));
        a.download = `ontario-trip-${Date.now()}.webm`; a.click();
    };
    mediaRecorder.start(100);
    isRecording = true;
    document.getElementById('recording-indicator').style.display = 'block';
    document.getElementById('record-btn').textContent = '⏹ Stop Recording';
    let sec = 0;
    const timer = setInterval(() => {
        if (!isRecording) { clearInterval(timer); return; }
        sec++;
        document.getElementById('rec-timer').textContent =
            `${String(Math.floor(sec/60)).padStart(2,'0')}:${String(sec%60).padStart(2,'0')}`;
    }, 1000);
    if (!isDriving) { resetDrive(); setTimeout(() => toggleDrive(), 120); }
}

function stopRecording() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
    isRecording = false;
    document.getElementById('recording-indicator').style.display = 'none';
    document.getElementById('record-btn').textContent = '⏺ Record Video';
}

const sleep = ms => new Promise(r => setTimeout(r, ms));

document.getElementById('speed-control').addEventListener('input', e => {
    document.getElementById('speed-value').textContent = parseFloat(e.target.value).toFixed(1) + '×';
});

function onWindowResize() {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
}

init();
</script>
